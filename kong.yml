_format_version: "3.0"

# ==========================================
# PLUGINS GLOBAIS (Aplica para todo o Kong)
# ==========================================
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://localhost:8000       # Padrão do Ionic web
        - http://10.41.89.110:3000    # Seu novo IP (React/Next)
        - http://10.0.0.17:8100
        - http://10.0.0.17:8000   # Seu novo IP (Ionic web)
        - http://localhost            # Aplicativos Android (Capacitor)
        - capacitor://localhost
        
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
      credentials: true
      max_age: 3600

services:
  # ==========================================
  # 1. USER SERVICE
  # ==========================================
  - name: user-service
    url: http://user-service:8000
    routes:
      - name: auth-routes
        paths:
          - /api/login
          - /api/login/
          - /api/register
          - /api/register/
          - /api/token/refresh
          - /api/reset-password
          - /api/auth/google/
          - /api/profile/complete/
          - /api/admin-logs/       
          - /api/admin-logs
        strip_path: false
        # REMOVIDO: bloco plugins (cors) daqui

      - name: user-route-protected
        paths:
          - /api
        strip_path: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp

  # ==========================================
  # 2. CHAT SERVICE
  # ==========================================
  - name: chat-service
    url: http://chat-service:8000
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
          # 🌟 ADICIONE ESTAS 3 LINHAS AQUI:
          uri_param_names:
            - jwt
            - token
    routes:
      - name: chat-route
        paths:
          - /api/chat
          - /ws/chat/
        strip_path: false

  # ==========================================
  # 3. RIDE SERVICE
  # ==========================================
  - name: ride-service
    url: http://ride-service:8000
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
    routes:
      - name: ride-route
        paths:
          - /api/ride
        strip_path: false

  # ==========================================
  # 4. NOTIFICATION SERVICE
  # ==========================================
  - name: notification-service
    url: http://notification-service:8000
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
    routes:
      - name: notification-route
        paths:
          - /api/notifications
        strip_path: false

consumers:
  - username: frontend-app
    jwt_secrets:
      - key: "raijmobi-app"
        secret: "django-insecure-(x-9q@fyfpu&cc%0p7=0a+=5p_aa2m*###8w8xm&$p_ep$x4ks"
        algorithm: "HS256"