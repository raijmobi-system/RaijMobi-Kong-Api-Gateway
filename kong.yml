_format_version: "3.0"

services:
  # ==========================================
  # 1. USER SERVICE
  # ==========================================
  - name: user-service
    url: http://user-service:8000
    routes:
      # --- ROTAS PÚBLICAS (Sem JWT) ---
      - name: auth-routes
        paths:
          - /api/login           # <-- Rota real do Django liberada!
          - /api/register        # <-- Rota real do Django liberada!
          - /api/token/refresh   # <-- Rota real do Django liberada!
          - /api/reset-password    
        strip_path: false
      
      # --- ROTAS PROTEGIDAS (Com JWT) ---
      - name: user-route-protected
        paths:
          - /api
        strip_path: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp

  # ==========================================
  # 2. CHAT SERVICE
  # ==========================================
  - name: chat-service
    url: http://chat-service:8000       # <-- Aponta para a porta 8000 do container chat
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
    routes:
      - name: chat-route
        paths:
          - /api/chat
        strip_path: false

  # ==========================================
  # 3. RIDE SERVICE
  # ==========================================
  - name: ride-service
    url: http://ride-service:8000       # <-- Aponta para a porta 8000 do container ride
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
    routes:
      - name: ride-route
        paths:
          - /api/ride
        strip_path: false

  - name: notification-service
    url: http://notification-service:8000
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
    routes:
      - name: notification-route
        paths:
          - /api/notifications
        strip_path: false



consumers:
  - username: frontend-app
    jwt_secrets:
      - key: "raijmobi-app"
        secret: "django-insecure-(x-9q@fyfpu&cc%0p7=0a+=5p_aa2m*###8w8xm&$p_ep$x4ks"
        algorithm: "HS256"