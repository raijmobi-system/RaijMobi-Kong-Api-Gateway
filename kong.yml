_format_version: "3.0"

services:
  - name: user-service
    url: http://user-service:8000
    routes:
      - name: user-route
        paths:
          - /api/auth          # prefixo correspondente ao Django
        strip_path: false

  - name: chat-service
    url: http://chat-service:8002
    routes:
      - name: chat-route
        paths:
          - /api/chat
        strip_path: false

  - name: ride-service
    url: http://ride-service:8000
    routes:
      - name: ride-route
        paths:
          - /api/ride
        strip_path: false