_format_version: "3.0"

services:
  - name: chat-service
    url: http://chat-service:8002
    routes:
      - name: chat-route
        paths:
          - /chat
        strip_path: true

  - name: user-service
    url: http://user-service:8000
    routes:
      - name: user-route
        paths:
          - /api
        strip_path: false   # preserva /api na requisição repassada

  - name: ride-service
    url: http://ride-service:8000
    routes:
      - name: ride-route
        paths:
          - /api/v1
        strip_path: false
