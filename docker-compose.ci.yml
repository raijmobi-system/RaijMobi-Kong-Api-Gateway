services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - raijmobi-ci

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    networks:
      - raijmobi-ci

  # =================== BANCOS DE DADOS ===================

  postgres-user:
    image: postgres:14
    container_name: postgres-user
    environment:
      POSTGRES_USER: raijmobi_user
      POSTGRES_PASSWORD: ci_password
      POSTGRES_DB: raijmobi_user_db
    ports:
      - "5432:5432"
    networks:
      - raijmobi-ci

  postgres-ride:
    image: postgres:14
    container_name: postgres-ride
    environment:
      POSTGRES_USER: raijmobi_ride
      POSTGRES_PASSWORD: raijmobi_pass
      POSTGRES_DB: raijmobi_ride_db
    ports:
      - "5433:5432"
    networks:
      - raijmobi-ci

  postgres-chat:
    image: postgres:14
    container_name: postgres-chat
    environment:
      POSTGRES_USER: raijmobi_chat
      POSTGRES_PASSWORD: raijmobi_pass
      POSTGRES_DB: raijmobi_chat_db
    ports:
      - "5434:5432"
    networks:
      - raijmobi-ci

  postgres-notification:
    image: postgres:14
    container_name: postgres-notification
    environment:
      POSTGRES_USER: raijmobi_notifications
      POSTGRES_PASSWORD: raijmobi_pass
      POSTGRES_DB: raijmobi_notifications_db
    ports:
      - "5435:5432"
    networks:
      - raijmobi-ci

  # =================== SERVIÇOS ===================

  user-service:
    build: https://github.com/raijmobi-system/RaijMobi-User-Service.git#develop
    container_name: user-service
    environment:
      DB_NAME: raijmobi_user_db
      DB_USER: raijmobi_user
      DB_PASSWORD: ci_password
      DB_HOST: postgres-user
      DB_PORT: 5432
      # Secrets com fallback – funcionam mesmo sem o ambiente ci-tests
      RESEND_API_KEY: ${RESEND_API_KEY:-dummy_resend_key}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy_google_client_id}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-user-ci-key}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_dummy}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy}
      DEBUG: "0"
    command: >
      sh -c "
        python manage.py makemigrations user_service --noinput 2>/dev/null || true;
        python manage.py migrate --noinput;
        python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      - postgres-user
      - kafka
    ports:
      - "8001:8000"
    networks:
      - raijmobi-ci

  ride-service:
    build: https://github.com/raijmobi-system/RaijMobi-Ride-Service.git#develop
    container_name: ride-service
    environment:
      DB_NAME: raijmobi_ride_db
      DB_USER: raijmobi_ride
      DB_PASSWORD: raijmobi_pass
      DB_HOST: postgres-ride
      DB_PORT: 5432
      KAFKA_BROKER: kafka:9092
      # As mesmas secrets, com fallback
      RESEND_API_KEY: ${RESEND_API_KEY:-dummy_resend_key}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy_google_client_id}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-ride-ci-key}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_dummy}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy}
    command: >
      sh -c "
        python manage.py migrate --noinput;
        python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      - postgres-ride
      - kafka
    ports:
      - "8002:8000"
    networks:
      - raijmobi-ci

  chat-service:
    build: https://github.com/raijmobi-system/RaijMobi-Chat-Service.git#main
    container_name: chat-service
    environment:
      DB_NAME: raijmobi_chat_db
      DB_USER: raijmobi_chat
      DB_PASSWORD: raijmobi_pass
      DB_HOST: postgres-chat
      DB_PORT: 5432
      KAFKA_BROKER: kafka:9092
    depends_on:
      - postgres-chat
      - kafka
    ports:
      - "8003:8000"
    networks:
      - raijmobi-ci

  notification-service:
    build: https://github.com/raijmobi-system/RaijMobi-Notifications-Service.git#main
    container_name: notification-service
    environment:
      DB_NAME: raijmobi_notifications_db
      DB_USER: raijmobi_notifications
      DB_PASSWORD: raijmobi_pass
      DB_HOST: postgres-notification
      DB_PORT: 5432
      KAFKA_BROKER: kafka:9092
    depends_on:
      - postgres-notification
      - kafka
    ports:
      - "8004:8000"
    networks:
      - raijmobi-ci

  kong:
    image: kong:3.4
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000"
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml:ro
    depends_on:
      - user-service
      - ride-service
      - chat-service
      - notification-service
    networks:
      - raijmobi-ci

networks:
  raijmobi-ci:
    driver: bridge