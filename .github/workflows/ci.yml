name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build and start services
        run: |
          docker compose -f docker-compose.ci.yml up -d --build

      # Logs de debug
      - name: Show container logs (debug)
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml logs

      - name: Wait for services to be ready
        run: |
          echo "⏳ Aguardando Kong (localhost:8000)..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -qE "^[1-5][0-9]{2}$"; then
              echo "✅ Kong respondendo!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Kong não subiu após 60 segundos!"
              exit 1
            fi
            echo "Tentativa $i/30..."
            sleep 2
          done

          echo "⏳ Aguardando user-service (localhost:8001)..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/api/health/ | grep -q "200"; then
              echo "✅ user-service pronto!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ user-service não subiu!"
              exit 1
            fi
            sleep 2
          done

          echo "⏳ Aguardando ride-service (localhost:8002)..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8002/api/ride/rides/ | grep -q "200"; then
              echo "✅ ride-service pronto!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ ride-service não subiu!"
              exit 1
            fi
            sleep 2
          done

          echo "⏳ Aguardando chat-service (localhost:8003)..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8003/api/chat/rooms/ | grep -q "200"; then
              echo "✅ chat-service pronto!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ chat-service não subiu!"
              exit 1
            fi
            sleep 2
          done

          echo "⏳ Aguardando notification-service (localhost:8004)..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8004/api/notifications/ | grep -q "200"; then
              echo "✅ notification-service pronto!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ notification-service não subiu!"
              exit 1
            fi
            sleep 2
          done

          echo "✅ Todos os serviços estão disponíveis!"

      - name: Run integration tests
        env:
          BASE_URL: http://localhost:8000
          RIDE_SERVICE_URL: http://localhost:8002
        run: |
          python tests/integration_test.py

      - name: Stop services (always run)
        if: always()
        run: docker compose -f docker-compose.ci.yml down