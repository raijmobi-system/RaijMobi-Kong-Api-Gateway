name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build and start services
        run: |
          docker compose -f docker-compose.ci.yml up -d --build

      - name: Wait for services to be ready
        run: |
          echo "⏳ Aguardando Kong..."
          until curl -s -o /dev/null -w "%{http_code}" http://kong:8000 | grep -q "404\|200"; do
            sleep 2
          done
          echo "✅ Kong pronto!"

          echo "⏳ Aguardando user-service..."
          until curl -s -o /dev/null -w "%{http_code}" http://user-service:8000/api/health/ | grep -q "200"; do
            sleep 2
          done
          echo "✅ user-service pronto!"

          echo "⏳ Aguardando ride-service..."
          until curl -s -o /dev/null -w "%{http_code}" http://ride-service:8000/api/ride/rides/ | grep -q "200"; do
            sleep 2
          done
          echo "✅ ride-service pronto!"

          echo "⏳ Aguardando chat-service..."
          until curl -s -o /dev/null -w "%{http_code}" http://chat-service:8000/api/chat/rooms/ | grep -q "200"; do
            sleep 2
          done
          echo "✅ chat-service pronto!"

          echo "⏳ Aguardando notification-service..."
          until curl -s -o /dev/null -w "%{http_code}" http://notification-service:8000/api/notifications/ | grep -q "200"; do
            sleep 2
          done
          echo "✅ notification-service pronto!"

          echo "✅ Todos os serviços estão disponíveis!"

      - name: Run integration tests
        env:
          BASE_URL: http://kong:8000
          RIDE_SERVICE_URL: http://ride-service:8000   # ⬅️ ADICIONADO
        run: |
          python tests/integration_test.py

      - name: Stop services (always run)
        if: always()
        run: docker compose -f docker-compose.ci.yml down